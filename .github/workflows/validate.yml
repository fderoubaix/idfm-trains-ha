---
name: Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"  # chaque lundi à 6h — détecte les régressions HA
  workflow_dispatch:

jobs:
  # ── 1. Hassfest : validation officielle Home Assistant ────────
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hassfest
        uses: "home-assistant/actions/hassfest@master"

  # ── 2. HACS : validation du dépôt pour HACS ──────────────────
  hacs:
    name: HACS Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
